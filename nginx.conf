server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip Komprimierung für bessere Performance
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Routing-Logik: Wichtig für SSG
    # Sucht nach der genauen Datei ($uri), dann nach .html ($uri.html),
    # dann nach einem Ordner ($uri/) und fällt auf index.html zurück (für SPA-Fallback).
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    # Caching-Header für Assets (Bilder, JS, CSS)
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg|mp4|webm)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public, max-age=15552000, immutable";
    }

    error_page 404 /404.html;
}
